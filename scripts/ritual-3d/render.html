<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:transparent}canvas{display:block}</style>
<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three'
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'

const W = 900, H = 1180
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true })
renderer.setSize(W, H); renderer.setPixelRatio(1)
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.0
renderer.outputColorSpace = THREE.SRGBColorSpace
document.body.appendChild(renderer.domElement)

const scene = new THREE.Scene()
const pmrem = new THREE.PMREMGenerator(renderer)
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture

const camera = new THREE.PerspectiveCamera(30, W / H, 0.1, 100)
camera.position.set(0, 1.15, 7.0); camera.lookAt(0, -0.05, 0)

const group = new THREE.Group(); scene.add(group)
const smooth = (a, b, x) => { const t = Math.min(Math.max((x - a) / (b - a), 0), 1); return t * t * (3 - 2 * t) }

const LIQ_BOTTOM = -1.42, FULLH = 2.2
let liquidPivot, surface, foam, foamMat

// clear glass tumbler
const prof = []
for (let i = 0; i <= 24; i++) { const t = i / 24; prof.push(new THREE.Vector2(0.9 + t * 0.22, -1.55 + t * 3.15)) }
const glass = new THREE.Mesh(new THREE.LatheGeometry(prof, 100), new THREE.MeshPhysicalMaterial({
  color: 0xffffff, metalness: 0, roughness: 0.04, transmission: 1, thickness: 0.55, ior: 1.5,
  transparent: true, side: THREE.DoubleSide, envMapIntensity: 1.5, clearcoat: 1, clearcoatRoughness: 0.04,
}))
group.add(glass)
// glass bottom (thick base)
const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.12, 100), glass.material)
base.position.y = -1.49; group.add(base)

// vibrant matcha liquid (fills from bottom)
liquidPivot = new THREE.Group(); liquidPivot.position.y = LIQ_BOTTOM; group.add(liquidPivot)
const matchaMat = new THREE.MeshPhysicalMaterial({ color: 0x5f9e19, roughness: 0.36, metalness: 0, transmission: 0, ior: 1.34, clearcoat: 0.2, clearcoatRoughness: 0.55, envMapIntensity: 0.2, emissive: 0x28430f, emissiveIntensity: 0.3 })
const liquid = new THREE.Mesh(new THREE.CylinderGeometry(1.02, 0.86, FULLH, 100), matchaMat)
liquid.position.y = FULLH / 2; liquidPivot.add(liquid)
// (liquid cylinder's own top cap is the matcha surface — no separate disc)
// foam dome (appears when nearly full)
foamMat = new THREE.MeshStandardMaterial({ color: 0xe7ecd4, roughness: 1, transparent: true, opacity: 0 })
foam = new THREE.Mesh(new THREE.SphereGeometry(0.99, 72, 28, 0, Math.PI * 2, 0, Math.PI / 2), foamMat)
foam.scale.y = 0.13; group.add(foam)

// ice cubes (clear, refractive) inside the glass
const iceMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.03, transmission: 1, thickness: 0.5, ior: 1.31, transparent: true, side: THREE.DoubleSide, envMapIntensity: 1.6, clearcoat: 1 })
// ice floats at the matcha surface (~y 0.78) and pokes above it
for (const [x, y, z, s, r] of [[0.32, 0.74, 0.14, 0.6, 0.7], [-0.34, 0.66, -0.12, 0.64, 1.4], [0.06, 0.92, 0.3, 0.52, 2.1], [0.28, 0.62, -0.34, 0.48, 0.4]]) {
  const c = new THREE.Mesh(new THREE.BoxGeometry(0.46 * s, 0.46 * s, 0.46 * s), iceMat)
  c.position.set(x, y, z); c.rotation.set(r, r * 1.6, r * 0.6); group.add(c)
}

// contact shadow
const sc = document.createElement('canvas'); sc.width = sc.height = 256
const sx = sc.getContext('2d'); const rg = sx.createRadialGradient(128, 128, 8, 128, 128, 128)
rg.addColorStop(0, 'rgba(18,40,28,0.4)'); rg.addColorStop(1, 'rgba(18,40,28,0)')
sx.fillStyle = rg; sx.fillRect(0, 0, 256, 256)
const shadow = new THREE.Mesh(new THREE.PlaneGeometry(4.4, 3.0), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(sc), transparent: true, depthWrite: false }))
shadow.rotation.x = -Math.PI / 2; shadow.position.y = -1.56; scene.add(shadow)

const key = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(4, 7, 5); scene.add(key)
const fill = new THREE.DirectionalLight(0xffffff, 1.2); fill.position.set(-5, 3, -4); scene.add(fill)
scene.add(new THREE.AmbientLight(0xffffff, 0.18))

// progress 0..1: glass fills with matcha over the first ~55%, then rotates.
window.renderFrame = (p) => {
  const f = smooth(0, 0.55, p)
  liquidPivot.scale.y = Math.max(f, 0.001)
  const top = LIQ_BOTTOM + f * FULLH
  foam.position.y = top; foamMat.opacity = smooth(0.82, 1, f)
  group.rotation.y = smooth(0.32, 1, p) * Math.PI * 2
  renderer.render(scene, camera)
}
window.renderFrame(1)
window.__ready = true
</script>
</body>
</html>
