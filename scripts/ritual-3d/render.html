<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:transparent}canvas{display:block}</style>
<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three'
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js'
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js'

const W = 900, H = 1180
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true })
renderer.setSize(W, H); renderer.setPixelRatio(1)
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.0
renderer.outputColorSpace = THREE.SRGBColorSpace
document.body.appendChild(renderer.domElement)

const scene = new THREE.Scene()
const pmrem = new THREE.PMREMGenerator(renderer)
const hdr = await new RGBELoader().loadAsync('./assets/studio_small_08_1k.hdr')
scene.environment = pmrem.fromEquirectangular(hdr).texture
hdr.dispose()

const camera = new THREE.PerspectiveCamera(30, W / H, 0.1, 100)
camera.position.set(0, 1.15, 7.0); camera.lookAt(0, -0.05, 0)

const group = new THREE.Group(); scene.add(group)
const smooth = (a, b, x) => { const t = Math.min(Math.max((x - a) / (b - a), 0), 1); return t * t * (3 - 2 * t) }

const LIQ_BOTTOM = -1.42, FULLH = 2.2
let surface, foam, foamMat

// per-drink liquid styling, selected via ?drink=… (default: the original matcha).
// stops = [t 0..1 bottom→top, color]; wobble = amplitude of the wavy layer
// boundary (real poured layers aren't ruler-straight). Colors matched to
// Tamatcha's own drink photos (public/img/post4_fizz) + web references.
const DRINKS = {
  matcha: {
    stops: [[0, 0x3f6b10], [1, 0x6fae1e]], wobble: 0.02,
    surface: 0x6fae1e, meniscus: 0x74a82a, foam: { y: 0.09, color: 0xe7ecd4 },
  },
  latte: { // white milk below, wispy blend, deep matcha above
    stops: [[0, 0xece4d8], [0.44, 0xe4dbcc], [0.60, 0x6e9440], [0.70, 0x2e5a13], [0.88, 0x35661a], [1, 0x47821d]],
    wobble: 0.05, surface: 0x4c8a20, meniscus: 0x5c9427, foam: { y: 0.08, color: 0xdfe8c8 },
  },
  fizz: { // maracuja purée bottom, pale sparkling middle, matcha top (post4_fizz)
    stops: [[0, 0xb4590e], [0.13, 0xd07a1e], [0.20, 0xd3cdb2], [0.66, 0xdad4bc], [0.78, 0x7fae46], [1, 0x55951f]],
    wobble: 0.03, surface: 0x67a52e, meniscus: 0x74a82a, foam: { y: 0.05, color: 0xeff3dc }, bubbles: true,
  },
  cloud: { // strawberry purée bottom, coconut water middle, big pale foam cloud
    stops: [[0, 0xa83a4a], [0.13, 0xc25563], [0.20, 0xe6e1d2], [0.60, 0xeae5d7], [0.78, 0xd6e0b4], [1, 0xc8dba2]],
    wobble: 0.03, surface: 0xe3ecc4, meniscus: 0xcfe0a0, foam: { y: 0.34, color: 0xf6f8ee },
  },
  mate: { // yerba: mahogany depth to golden amber top
    stops: [[0, 0x6e2c0c], [0.40, 0xa04c12], [0.75, 0xc26a1a], [1, 0xd98a30]],
    wobble: 0.02, surface: 0xd98a30, meniscus: 0xdf9440, foam: { y: 0.03, color: 0xf0d9b8 },
  },
}
const drink = DRINKS[new URLSearchParams(location.search).get('drink')] || DRINKS.matcha

// condensation maps: roughnessMap green channel multiplies material.roughness (set to 1),
// so paint fog ~0.35 gray and droplet-cleared spots near-black. Bump = droplet relief.
// Seeded PRNG keeps re-renders frame-identical.
function makeCondensationMaps() {
  let s = 42
  const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296 }
  const W = 512, H = 1024
  const rough = document.createElement('canvas'); rough.width = W; rough.height = H
  const bump = document.createElement('canvas'); bump.width = W; bump.height = H
  const rc = rough.getContext('2d'), bc = bump.getContext('2d')

  // base: clear glass (low roughness) everywhere, fog band over the liquid zone.
  // canvas y=0 maps to v=1 (rim); fog starts below the rim and covers the liquid zone.
  rc.fillStyle = 'rgb(13,13,13)'; rc.fillRect(0, 0, W, H)
  const fog = rc.createLinearGradient(0, 0, 0, H)
  fog.addColorStop(0.0, 'rgba(90,90,90,0)')
  fog.addColorStop(0.28, 'rgba(90,90,90,0.9)')
  fog.addColorStop(0.92, 'rgba(90,90,90,0.9)')
  fog.addColorStop(1.0, 'rgba(90,90,90,0.35)')
  rc.fillStyle = fog; rc.fillRect(0, 0, W, H)
  bc.fillStyle = 'black'; bc.fillRect(0, 0, W, H)

  // drip trails: clear streaks wiping through the fog, droplet blob at the bottom end
  for (let i = 0; i < 7; i++) {
    const x = rnd() * W, y0 = H * (0.18 + rnd() * 0.25), len = H * (0.12 + rnd() * 0.28), w = 3 + rnd() * 3
    rc.strokeStyle = 'rgb(13,13,13)'; rc.lineWidth = w; rc.lineCap = 'round'
    rc.beginPath(); rc.moveTo(x, y0); rc.lineTo(x, y0 + len); rc.stroke()
    const g = bc.createRadialGradient(x, y0 + len, 0, x, y0 + len, w * 1.4)
    g.addColorStop(0, 'rgba(255,255,255,0.9)'); g.addColorStop(1, 'rgba(255,255,255,0)')
    bc.fillStyle = g; bc.beginPath(); bc.arc(x, y0 + len, w * 1.4, 0, Math.PI * 2); bc.fill()
  }

  // droplets: cleared circles in the fog + height bumps
  for (let i = 0; i < 220; i++) {
    const x = rnd() * W, y = H * (0.22 + rnd() * 0.7), r = 1.5 + rnd() * rnd() * 6
    rc.fillStyle = 'rgb(13,13,13)'; rc.beginPath(); rc.arc(x, y, r, 0, Math.PI * 2); rc.fill()
    const g = bc.createRadialGradient(x - r * 0.25, y - r * 0.25, 0, x, y, r)
    g.addColorStop(0, 'rgba(255,255,255,0.95)'); g.addColorStop(0.8, 'rgba(255,255,255,0.4)'); g.addColorStop(1, 'rgba(255,255,255,0)')
    bc.fillStyle = g; bc.beginPath(); bc.arc(x, y, r, 0, Math.PI * 2); bc.fill()
  }

  const mk = (c) => { const t = new THREE.CanvasTexture(c); t.wrapS = THREE.RepeatWrapping; return t }
  return { bump: mk(bump), rough: mk(rough) }
}

// clear glass tumbler
const prof = []
for (let i = 0; i <= 24; i++) { const t = i / 24; prof.push(new THREE.Vector2(0.9 + t * 0.22, -1.55 + t * 3.15)) }
// rolled lip: bulge out, curve over the top, tuck slightly down the inner side
prof.push(new THREE.Vector2(1.135, 1.63), new THREE.Vector2(1.13, 1.66), new THREE.Vector2(1.10, 1.665), new THREE.Vector2(1.075, 1.64))
const cond = makeCondensationMaps()
const glass = new THREE.Mesh(new THREE.LatheGeometry(prof, 100), new THREE.MeshPhysicalMaterial({
  color: 0xffffff, metalness: 0, roughness: 1, roughnessMap: cond.rough,
  bumpMap: cond.bump, bumpScale: 1.6,
  transmission: 1, thickness: 0.55, ior: 1.5,
  transparent: true, side: THREE.DoubleSide, envMapIntensity: 1.5, clearcoat: 1, clearcoatRoughness: 0.04,
}))
group.add(glass)
// glass bottom (thick base)
const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.12, 100), glass.material)
base.position.y = -1.49; group.add(base)

// liquid: lathe matched to the glass inner wall, revealed by a clipping plane —
// a y-scaled cylinder pokes through the tapered glass mid-fill, this can't.
renderer.localClippingEnabled = true
const glassR = (y) => 0.9 + 0.22 * (y + 1.55) / 3.15
const FULL_TOP = LIQ_BOTTOM + FULLH
const clip = new THREE.Plane(new THREE.Vector3(0, -1, 0), FULL_TOP)
// vertex-color depth gradient: multi-stop per-drink layers, no emissive hack
const matchaMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, vertexColors: true, roughness: 0.36, metalness: 0, clearcoat: 0.25, clearcoatRoughness: 0.5, envMapIntensity: 0.35, clippingPlanes: [clip] })
const lprof = []
for (let i = 0; i <= 60; i++) { const y = LIQ_BOTTOM + (i / 60) * FULLH; lprof.push(new THREE.Vector2(glassR(y) - 0.045, y)) }
const liqGeo = new THREE.LatheGeometry(lprof, 100)
{
  const stops = drink.stops.map(([t, c]) => [t, new THREE.Color(c)])
  const grade = (t, out) => {
    let i = 0
    while (i < stops.length - 2 && t > stops[i + 1][0]) i++
    const k = Math.min(Math.max((t - stops[i][0]) / Math.max(stops[i + 1][0] - stops[i][0], 1e-6), 0), 1)
    return out.lerpColors(stops[i][1], stops[i + 1][1], k)
  }
  const pos = liqGeo.attributes.position, col = new Float32Array(pos.count * 3)
  const c = new THREE.Color()
  for (let i = 0; i < pos.count; i++) {
    // wavy layer boundary: low-frequency wobble around the circumference
    const a = Math.atan2(pos.getZ(i), pos.getX(i))
    const wob = (Math.sin(a * 3 + 1.7) * 0.4 + Math.sin(a * 7 + 0.3) * 0.3 + Math.sin(a * 13 + 2.1) * 0.3) * drink.wobble
    const t = (pos.getY(i) - LIQ_BOTTOM) / FULLH + wob // 0 bottom .. 1 top
    grade(Math.min(Math.max(t, 0), 1), c)
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b
  }
  liqGeo.setAttribute('color', new THREE.BufferAttribute(col, 3))
}
const liquid = new THREE.Mesh(liqGeo, matchaMat)
group.add(liquid)
// fizz: tiny bubbles suspended in the liquid, revealed by the same clip plane
if (drink.bubbles) {
  let bs = 7
  const brnd = () => { bs = (bs * 1664525 + 1013904223) >>> 0; return bs / 4294967296 }
  const bubMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, transparent: true, opacity: 0.45, envMapIntensity: 1.2, clippingPlanes: [clip] })
  const bubGeo = new THREE.SphereGeometry(1, 10, 8)
  for (let i = 0; i < 55; i++) {
    const y = LIQ_BOTTOM + 0.25 + brnd() * (FULLH - 0.35)
    const rr = Math.sqrt(brnd()) * (glassR(y) - 0.14), a = brnd() * Math.PI * 2
    const b = new THREE.Mesh(bubGeo, bubMat)
    b.scale.setScalar(0.012 + brnd() * 0.02)
    b.position.set(Math.cos(a) * rr, y, Math.sin(a) * rr)
    group.add(b)
  }
}
// drink surface: disc riding the fill line (covers the clipped lathe's open top)
const surfMat = new THREE.MeshPhysicalMaterial({ color: drink.surface, roughness: 0.4, metalness: 0, clearcoat: 0.3, clearcoatRoughness: 0.4, envMapIntensity: 0.4 })
surface = new THREE.Mesh(new THREE.CircleGeometry(1, 96), surfMat)
surface.rotation.x = -Math.PI / 2; group.add(surface)
// meniscus: subtle bright ring where liquid meets glass, tracks the fill line
const menMat = new THREE.MeshStandardMaterial({ color: drink.meniscus, roughness: 0.25, transparent: true, opacity: 0 })
const meniscus = new THREE.Mesh(new THREE.TorusGeometry(1, 0.016, 10, 96), menMat)
meniscus.rotation.x = Math.PI / 2; group.add(meniscus)
// foam dome (appears when nearly full; the Cloud's big fluffy cap lives here)
foamMat = new THREE.MeshStandardMaterial({ color: drink.foam.color, roughness: 1, transparent: true, opacity: 0 })
foam = new THREE.Mesh(new THREE.SphereGeometry(0.99, 72, 28, 0, Math.PI * 2, 0, Math.PI / 2), foamMat)
foam.scale.y = drink.foam.y; group.add(foam)

// ice cubes (clear, refractive) inside the glass
const iceMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.03, transmission: 1, thickness: 0.5, ior: 1.31, transparent: true, side: THREE.DoubleSide, envMapIntensity: 1.6, clearcoat: 1 })
// ice floats at the matcha surface (~y 0.78) and pokes above it
// hand-cracked ice: rounded boxes + position-hashed vertex jitter (hash keeps
// duplicated seam vertices moving together, so no cracks open up)
const jitter = (geo, amp) => {
  const pos = geo.attributes.position
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i)
    const h = (k) => { const v = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719 + k) * 43758.5453; return (v - Math.floor(v)) - 0.5 }
    pos.setXYZ(i, x + h(1) * amp, y + h(2) * amp, z + h(3) * amp)
  }
  geo.computeVertexNormals()
  return geo
}
// ice rides the fill line: rests low in the empty glass, floats up with the liquid
const iceGroup = new THREE.Group(); group.add(iceGroup)
for (const [x, y, z, s, r, sy] of [[0.32, 0.74, 0.14, 0.6, 0.7, 0.85], [-0.34, 0.66, -0.12, 0.64, 1.4, 1.1], [0.06, 0.92, 0.3, 0.52, 2.1, 0.9], [0.28, 0.62, -0.34, 0.48, 0.4, 1.15]]) {
  const d = 0.46 * s
  const c = new THREE.Mesh(jitter(new RoundedBoxGeometry(d, d, d, 3, d * 0.18), d * 0.07), iceMat)
  c.position.set(x, y, z); c.rotation.set(r, r * 1.6, r * 0.6); c.scale.y = sy; iceGroup.add(c)
}

// (no baked contact shadow — the site composites its own shadow per context;
// the baked plane read as a "table" band on lighter backgrounds like the hero)

const key = new THREE.DirectionalLight(0xffffff, 1.3); key.position.set(4, 7, 5); scene.add(key)
const fill = new THREE.DirectionalLight(0xffffff, 0.6); fill.position.set(-5, 3, -4); scene.add(fill)
scene.add(new THREE.AmbientLight(0xffffff, 0.08))

// progress 0..1: glass fills with matcha over the first ~55%, then rotates.
window.renderFrame = (p) => {
  const f = smooth(0, 0.55, p)
  const top = LIQ_BOTTOM + f * FULLH
  clip.constant = top
  liquid.visible = f > 0.02
  const rs = glassR(top) - 0.05
  surface.position.y = top; surface.scale.set(rs, rs, 1); surface.visible = liquid.visible
  foam.position.y = top; foamMat.opacity = smooth(0.82, 1, f)
  meniscus.position.y = top + 0.005; menMat.opacity = 0.6 * smooth(0.06, 0.2, f)
  meniscus.scale.set(rs + 0.02, rs + 0.02, 1)
  iceGroup.position.y = Math.max(top - FULL_TOP, -1.8)
  group.rotation.y = smooth(0.32, 1, p) * Math.PI * 2
  renderer.render(scene, camera)
}
window.renderFrame(1)
window.__ready = true
</script>
</body>
</html>
